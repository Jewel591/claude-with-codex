name: Feature request
description: Propose an improvement to the skills, scripts, or docs
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What situation do the current skills handle poorly?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should change? Note how it preserves the design principles in CONTRIBUTING.md (reviewer/doer separation, capability-conditional exceptions, unattended-safe channel).
    validations:
      required: true
